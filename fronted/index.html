<!DOCTYPE html>
<html>
<head>
  <title>MENESAH ERP</title>
  <style>
    
    body { margin:0; font-family:Arial; background:#f4f6f9; }

    .sidebar {
      width:220px;
      height:100vh;
      background:#111;
      color:white;
      position:fixed;
      transition:0.3s;
    }

    .sidebar.collapsed { width:60px; }

    .sidebar h2 { padding:20px; color:#00d4ff; }

    .sidebar button {
      width:100%;
      padding:12px;
      background:none;
      color:white;
      border:none;
      text-align:left;
      cursor:pointer;
    }

    .main {
      margin-left:220px;
      padding:20px;
      transition:0.3s;
    }

    .collapsed + .main {
      margin-left:60px;
    }

    .header {
      display:flex;
      justify-content:space-between;
      background:white;
      padding:15px;
      border-radius:10px;
    }

    .card {
      background:white;
      padding:20px;
      margin-top:20px;
      border-radius:10px;
    }

    table { width:100%; border-collapse:collapse; }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    button.action {
      padding:5px 10px;
      margin:2px;
      cursor:pointer;
      
    }
    .watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  opacity: 0.05;
  transform: translate(-50%, -50%);
  width: 400px;
  } 
  .pipeline {
  display: flex;
  justify-content: space-between;
  margin: 20px 0;
}

.pipeline div {
  padding: 10px;
  background: #ddd;
  border-radius: 5px;
}  
@media (max-width: 768px) {
  .sidebar {
    width: 60px;
  }

  .sidebar span {
    display: none;
  }

  .content {
    margin-left: 60px;
  }

  .card {
    padding: 10px;
    font-size: 14px;
  }

  button {
    width: 100%;
    margin-top: 5px;
  }
}
.dashboard {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.card {
  flex: 1 1 200px;
}
table {
  width: 100%;
  overflow-x: auto;
  display: block;
} 
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>MENESAH LOGIN</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>
<input id="search" placeholder="Search name..." onkeyup="loadApplications()">
<select id="statusFilter" onchange="loadApplications()">
  <option value="">All</option>
  <option>Applied</option>
  <option>Approved</option>
  <option>Medical</option>
  <option>Selected</option>
  <option>TicketReady</option>
</select>
<select id="company">
</select>
<!-- APP -->
<img src="logo.png" class="watermark">
<div class="header">
  <img src="logo.png" height="40">
  <span>MENESAH</span>
</div>
<div class="pipeline">
  <div>Applied</div>
  <div>Approved</div>
  <div>Medical</div>
  <div>Selected</div>
  <div>TicketReady</div>
</div>
<div id="app" style="display:none;">

  <div id="sidebar" class="sidebar">
    <h2>MENESAH</h2>

    <button onclick="toggleSidebar()">☰</button>

    <button onclick="showDashboard()">Dashboard</button>
    <button onclick="loadApplications()">Applicants</button>
    <button onclick="showSelected()">Selected</button>
    <button onclick="loadTicketReady()">Ticket Ready</button>
    <button onclick="downloadReport()">Download Report</button>
  </div>

  <div class="main">
    <div class="header">
      <div id="userInfo"></div>
      <button onclick="logout()">Logout</button>
    </div>

    <div id="content"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
